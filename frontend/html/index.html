<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Game Lobbies</title>
    <link rel="stylesheet" href="/assets/css/lobbies.css">
    <script src="/assets/js/lobbies.js" defer></script>
</head>
<body>
    <main class="lobby-shell">
        <header>
            <p class="eyebrow">Local game</p>
            <h1>Choose a lobby</h1>
            <p>Join an available lobby or create a private one.</p>
        </header>

        <section class="panel">
            <div class="list-heading">
                <h2>Available lobbies</h2>
                <button id="refresh" class="secondary" type="button">Refresh</button>
            </div>
            <p id="list-status" role="status">Loading…</p>
            <ul id="lobby-list"></ul>
        </section>

        <div class="create-action">
            <button id="open-create" type="button">Create a lobby</button>
        </div>

        <dialog id="create-dialog">
            <form id="create-form">
                <h2>Create a lobby</h2>
                <label>Lobby name <input name="name" maxlength="60" required autofocus></label>
                <label>Password <input name="password" type="text" minlength="4" maxlength="72" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" required></label>
                <p id="create-error" class="error" role="alert"></p>
                <div class="actions">
                    <button id="cancel-create" class="secondary" type="button">Cancel</button>
                    <button type="submit">Create lobby</button>
                </div>
            </form>
        </dialog>

        <dialog id="join-dialog">
            <form id="join-form">
                <h2>Join <span id="join-name"></span></h2>
                <label>Password <input name="password" type="text" maxlength="72" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" required autofocus></label>
                <p id="join-error" class="error" role="alert"></p>
                <div class="actions">
                    <button id="cancel-join" class="secondary" type="button">Cancel</button>
                    <button type="submit">Join lobby</button>
                </div>
            </form>
        </dialog>
    </main>
</body>
</html>
