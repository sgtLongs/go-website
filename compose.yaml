name: go-website-local

services:
  app:
    build:
      context: .
    image: go-website:local
    ports:
      - "${PORT:-8080}:8080"
    environment:
      ADDRESS: ":8080"
      BASE_PATH: "${BASE_PATH:-}"
      DATA_PATH: "/app/data/game.db"
      GIN_MODE: "release"
    volumes:
      - local-game-data:/app/data
    restart: unless-stopped

volumes:
  local-game-data:
    name: go-website_local-game-data
