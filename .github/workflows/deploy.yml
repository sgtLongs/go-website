name: Test, publish, and deploy

on:
  push:
    branches:
      - main
      - beta
      - prod

concurrency:
  group: go-website-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Test and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_path: ${{ steps.target.outputs.api_path }}
      asset_path: ${{ steps.target.outputs.asset_path }}
      environment: ${{ steps.target.outputs.environment }}
      health_path: ${{ steps.target.outputs.health_path }}
      image: ${{ steps.target.outputs.image }}
      page_path: ${{ steps.target.outputs.page_path }}
      service: ${{ steps.target.outputs.service }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          started_at=$SECONDS
          go test ./...
          echo "Tests completed in $((SECONDS - started_at))s."

      - name: Select deployment target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          repository="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${repository}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

          case "$GITHUB_REF_NAME" in
            main)
              echo "api_path=/dev/api/lobbies" >> "$GITHUB_OUTPUT"
              echo "asset_path=/dev/assets/css/lobbies.css" >> "$GITHUB_OUTPUT"
              echo "environment=dev" >> "$GITHUB_OUTPUT"
              echo "service=dev" >> "$GITHUB_OUTPUT"
              echo "health_path=/dev/health" >> "$GITHUB_OUTPUT"
              echo "page_path=/dev/" >> "$GITHUB_OUTPUT"
              ;;
            beta)
              echo "api_path=/beta/api/lobbies" >> "$GITHUB_OUTPUT"
              echo "asset_path=/beta/assets/css/lobbies.css" >> "$GITHUB_OUTPUT"
              echo "environment=beta" >> "$GITHUB_OUTPUT"
              echo "service=beta" >> "$GITHUB_OUTPUT"
              echo "health_path=/beta/health" >> "$GITHUB_OUTPUT"
              echo "page_path=/beta/" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "api_path=/api/lobbies" >> "$GITHUB_OUTPUT"
              echo "asset_path=/assets/css/lobbies.css" >> "$GITHUB_OUTPUT"
              echo "environment=production" >> "$GITHUB_OUTPUT"
              echo "service=production" >> "$GITHUB_OUTPUT"
              echo "health_path=/health" >> "$GITHUB_OUTPUT"
              echo "page_path=/" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported deployment branch: $GITHUB_REF_NAME" >&2
              exit 1
              ;;
          esac

      - name: Validate deployment configuration
        env:
          BETA_IMAGE: ${{ steps.target.outputs.image }}
          DEV_IMAGE: ${{ steps.target.outputs.image }}
          PRODUCTION_IMAGE: ${{ steps.target.outputs.image }}
        run: docker compose --file deploy/compose.yaml config --quiet

      - name: Validate Caddy configuration
        run: >-
          docker run --rm
          --volume "${{ github.workspace }}/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.11.4-alpine
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start image publish timer
        shell: bash
        run: echo "IMAGE_PUBLISH_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build and publish immutable image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.target.outputs.image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Report image publish duration
        shell: bash
        run: |
          set -euo pipefail
          elapsed=$(( $(date +%s) - IMAGE_PUBLISH_STARTED_AT ))
          echo "Image build and publish completed in ${elapsed}s."
          echo "### Build timing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image build and publish: ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy ${{ needs.build.outputs.environment }}
    needs: build
    # Match only this repository's dedicated runner. It is registered without
    # GitHub's generic self-hosted labels so unrelated jobs cannot select it.
    runs-on: go-website
    environment:
      name: ${{ needs.build.outputs.environment }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out deployment configuration
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy and verify
        shell: bash
        env:
          API_PATH: ${{ needs.build.outputs.api_path }}
          ASSET_PATH: ${{ needs.build.outputs.asset_path }}
          DEPLOY_IMAGE: ${{ needs.build.outputs.image }}
          HEALTH_PATH: ${{ needs.build.outputs.health_path }}
          PAGE_PATH: ${{ needs.build.outputs.page_path }}
          SERVICE: ${{ needs.build.outputs.service }}
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN || 'localhost' }}
        run: |
          set -Eeuo pipefail

          # Keep environment changes from overlapping even if more
          # than one matching self-hosted runner is registered.
          exec 9>/tmp/go-website-deploy.lock
          if ! flock --wait 600 9; then
            echo "Timed out waiting for another deployment to finish." >&2
            exit 1
          fi

          compose=(docker compose --project-name go-website --file deploy/compose.yaml)

          case "$SERVICE" in
            dev)
              export DEV_IMAGE="$DEPLOY_IMAGE"
              image_variable=DEV_IMAGE
              ;;
            beta)
              export BETA_IMAGE="$DEPLOY_IMAGE"
              image_variable=BETA_IMAGE
              ;;
            production)
              export PRODUCTION_IMAGE="$DEPLOY_IMAGE"
              image_variable=PRODUCTION_IMAGE
              ;;
            *)
              echo "Unsupported deployment service: $SERVICE" >&2
              exit 1
              ;;
          esac

          "${compose[@]}" config --quiet

          previous_container=$("${compose[@]}" ps --quiet "$SERVICE" 2>/dev/null || true)
          previous_image=""
          if [[ -n "$previous_container" ]]; then
            previous_image=$(docker inspect --format '{{.Config.Image}}' "$previous_container")
          fi

          # The original local Compose file called the production service
          # "app". Stop that legacy container before the first production
          # deploy so it cannot hold the shared BoltDB volume open.
          legacy_container=""
          legacy_image=""
          legacy_was_running=false
          if [[ "$SERVICE" == production && -z "$previous_container" ]]; then
            legacy_containers=$(docker ps --all --quiet \
              --filter label=com.docker.compose.project=go-website \
              --filter label=com.docker.compose.service=app \
              --filter volume=go-website_game-data)
            legacy_container=${legacy_containers%%$'\n'*}
            if [[ -n "$legacy_container" ]]; then
              legacy_image=$(docker inspect --format '{{.Config.Image}}' "$legacy_container")
              legacy_was_running=$(docker inspect --format '{{.State.Running}}' "$legacy_container")
            fi
          fi

          rollback() {
            echo "Deployment checks failed; rolling $SERVICE back."
            if [[ -n "$previous_image" ]]; then
              export "$image_variable=$previous_image"
              "${compose[@]}" up --detach --no-deps --wait --wait-timeout 90 "$SERVICE"
            elif [[ "$legacy_was_running" == true && -n "$legacy_image" ]]; then
              # During the first cutover, run the old image as the new
              # production service so Caddy can still serve it on port 80.
              export PRODUCTION_IMAGE="$legacy_image"
              if "${compose[@]}" up --detach --no-deps --wait --wait-timeout 90 production \
                && "${compose[@]}" up --detach --no-deps proxy; then
                docker rm --force "$legacy_container"
                legacy_container=""
                legacy_was_running=false
              else
                "${compose[@]}" rm --force --stop production || true
                docker start "$legacy_container"
              fi
            else
              "${compose[@]}" rm --force --stop "$SERVICE" || true
              if [[ "$legacy_was_running" == true ]]; then
                docker start "$legacy_container"
              fi
            fi
          }

          if ! "${compose[@]}" pull "$SERVICE"; then
            echo "Could not pull $DEPLOY_IMAGE; the current service was not changed." >&2
            exit 1
          fi

          if [[ "$SERVICE" == production ]] \
            && ! docker volume inspect go-website_game-data >/dev/null 2>&1; then
            docker volume create go-website_game-data >/dev/null
          fi

          if [[ "$legacy_was_running" == true ]]; then
            docker stop "$legacy_container"
          fi

          if ! "${compose[@]}" up --detach --no-deps --wait --wait-timeout 90 "$SERVICE"; then
            rollback
            exit 1
          fi

          if ! "${compose[@]}" up --detach --no-deps proxy; then
            rollback
            exit 1
          fi

          # A bind-mounted Caddyfile does not change the Compose service hash,
          # so reload it explicitly. Caddy validates and applies the new config
          # without requiring the proxy container to be recreated.
          proxy_reloaded=false
          for attempt in {1..10}; do
            if "${compose[@]}" exec --no-TTY proxy \
              caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile; then
              proxy_reloaded=true
              break
            fi
            echo "Caddy reload $attempt/10 has not succeeded yet."
            sleep 1
          done
          if [[ "$proxy_reloaded" != true ]]; then
            rollback
            exit 1
          fi

          healthy=false
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "http://127.0.0.1${HEALTH_PATH}" >/dev/null \
              && curl --fail --silent --show-error "http://127.0.0.1${PAGE_PATH}" >/dev/null \
              && curl --fail --silent --show-error "http://127.0.0.1${ASSET_PATH}" >/dev/null \
              && curl --fail --silent --show-error "http://127.0.0.1${API_PATH}" >/dev/null; then
              healthy=true
              break
            fi
            echo "Smoke check $attempt/30 has not passed yet."
            sleep 2
          done

          if [[ "$healthy" != true ]]; then
            rollback
            exit 1
          fi

          if [[ -n "$legacy_container" ]]; then
            if ! docker rm --force "$legacy_container"; then
              echo "Warning: production is healthy, but the stopped legacy app container could not be removed." >&2
            fi
          fi

          echo "$SERVICE is running image $DEPLOY_IMAGE."
